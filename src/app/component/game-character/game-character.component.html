<div class="component is-3d is-grab is-pointer-events-none" [style.width.px]="size * gridSize"
  [style.height.px]="size * gridSize" appMovable [movable.option]="movableOption" (movable.ondragstart)="onMove()"
  (movable.ondragend)="onMoved()">
  <div class="component-content is-3d" [@bounceInOut]="'in'">
    <div class="component-content is-3d is-pointer-events-auto" appRotable [rotable.option]="rotableOption"
      (rotable.ondragstart)="onMove()" (rotable.ondragend)="onMoved()">
      <div class="pedestal-grab rotate-grab">
        <div class="pedestal-grab-border">
          <div class="material-icons of-front">autorenew</div>
          <div class="material-icons of-back">autorenew</div>
        </div>
      </div>
      <div class="pedestal-inner"></div>
      <div *ngIf="isSelected" class="selected-highlight" [ngClass]="{'is-magnetic': isMagnetic}"></div>
      <div class="pedestal-outer"></div>
      <div class="upright-transform is-fit-width is-3d">
        <div class="rotate-frame is-3d" [style.width.px]="size * gridSize" [style.height.px]="size * gridSize"
          appRotable [rotable.option]="rollOption" (rotable.ondragstart)="onMove()" (rotable.ondragend)="onMoved()">
          <div class="rotate-inner is-3d">
            <ng-container *ngIf="isSelected">
              <div *ngFor="let rotateY of ['0', '180deg']"
                class="selection-marker is-black-background"
                [ngClass]="{'is-magnetic': isMagnetic}"
                [ngStyle]="{'transform': 'translateX(-50%) translateX(' + size * gridSize / 2 +'px) rotateY(' + rotateY + ')'}">
                <i class="material-icons">keyboard_arrow_down</i>
              </div>
            </ng-container>
            <ng-container *ngIf="0 < name.length">
              <div *ngFor="let rotateY of ['0', '180deg']"
                class="name-tag is-nowrap is-black-background"
                [ngStyle]="{'transform': 'translateX(-50%) translateX(' + size * gridSize / 2 +'px) rotateY(' + rotateY + ')'}">
                <div class="has-length-limit">
                  {{name}}
                  <span *ngIf="isRoundActive"
                    class="action-done-mark material-icons"
                    [class.is-done]="isActionDone"
                    [class.is-pending]="!isActionDone">
                    {{isActionDone ? 'check_circle' : 'radio_button_unchecked'}}
                  </span>
                </div>
              </div>
            </ng-container>
            <ng-container *ngIf="0 < activeEffects.length">
              <div *ngFor="let rotateY of ['0', '180deg']"
                class="effect-badges"
                [ngStyle]="{'transform': 'translateX(-50%) translateX(' + size * gridSize / 2 +'px) rotateY(' + rotateY + ')'}">
                <div class="effect-badge is-black-background" *ngFor="let effect of activeEffects" [title]="formatEffectBadgeDetail(effect)">
                  {{formatEffectBadge(effect)}}
                </div>
              </div>
            </ng-container>
            <img class="image chrome-smooth-image-trick" *ngIf="0 < imageFile.url.length" [src]="imageFile.url | safe: 'resourceUrl'">
            <div class="rotate-grab rotate-grab-icon of-top"
              [ngStyle]="{'transform': 'translateX(-50%) translateX(' + size * gridSize / 2 +'px)'}">
              <i class="material-icons">autorenew</i>
            </div>
            <div class="rotate-grab rotate-grab-icon of-bottom"
              [ngStyle]="{'transform': 'translateX(-50%) translateX(' + size * gridSize / 2 +'px'}">
              <i class="material-icons">autorenew</i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
